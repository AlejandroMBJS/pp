name: CI + Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  # Cancel in-flight deploys to the same branch so only the latest commit wins.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Build + Typecheck + Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: arquicheck
          POSTGRES_PASSWORD: arquicheck-password
          POSTGRES_DB: arquicheck_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arquicheck -d arquicheck_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Backend — build + test
        working-directory: backend
        env:
          DATABASE_URL: postgres://arquicheck:arquicheck-password@localhost:5432/arquicheck_test?sslmode=disable
        run: |
          go build ./...
          go test ./... -count=1 -timeout 5m

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — install + typecheck + build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit --skipLibCheck
          npm run build
        env:
          API_BASE_URL: http://localhost:8080

  deploy:
    name: Deploy to VPS
    needs: test
    if: github.event_name == 'push' && (github.ref_name == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e
            cd /srv/projpul
            ./scripts/vps-deploy.sh ${{ github.ref_name }}
