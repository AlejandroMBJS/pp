services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # DB not exposed externally — internal network only

  backend:
    build:
      context: ./backend
    restart: always
    env_file:
      - .env
    environment:
      APP_ADDR: ":8080"
      DATABASE_URL: "postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable"
      UPLOAD_DIR: "/app/data/uploads"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/backend:/app/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    restart: always
    environment:
      API_BASE_URL: "http://backend:8080"
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"

  gateway:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "8888:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
