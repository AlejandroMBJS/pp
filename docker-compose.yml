services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: arquicheck
      POSTGRES_PASSWORD: arquicheck-password
      POSTGRES_DB: arquicheck
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    expose:
      - "5432"

  backend:
    build:
      context: ./backend
    environment:
      APP_ADDR: ":8080"
      DATABASE_URL: "postgres://arquicheck:arquicheck-password@db:5432/arquicheck?sslmode=disable"
      UPLOAD_DIR: "/app/data/uploads"
      JWT_SECRET: "projectpulse-dev-secret"
      PUBLIC_BASE_URL: "http://localhost:1212"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
    depends_on:
      - db
    volumes:
      - ./data/backend:/app/data
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    environment:
      API_BASE_URL: "http://backend:8080"
    depends_on:
      - backend
    expose:
      - "3000"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "1212:1212"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
