services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-arquicheck}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arquicheck-password}
      POSTGRES_DB: ${DB_NAME:-arquicheck}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  backend:
    build:
      context: ./backend
    environment:
      APP_ADDR: ":8080"
      DATABASE_URL: "postgres://${DB_USER:-arquicheck}:${DB_PASSWORD:-arquicheck-password}@db:5432/${DB_NAME:-arquicheck}?sslmode=${DB_SSLMODE:-disable}"
      UPLOAD_DIR: "/app/data/uploads"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (min 32 bytes)}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:1212}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:1212,http://localhost:3000}
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      PLATFORM_ADMIN_EMAIL: "${PLATFORM_ADMIN_EMAIL:-}"
      PLATFORM_ADMIN_PASSWORD: "${PLATFORM_ADMIN_PASSWORD:-}"
    depends_on:
      - db
    volumes:
      - ./data/backend:/app/data
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
    environment:
      API_BASE_URL: "http://backend:8080"
    depends_on:
      - backend
    expose:
      - "3000"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      # Host binding is parameterised so staging can bind 127.0.0.1 only while
      # dev still exposes on LAN. Defaults preserve the dev UX (LAN + port 1212).
      - "${GATEWAY_BIND_HOST:-0.0.0.0}:${GATEWAY_HTTP_PORT:-1212}:1212"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
