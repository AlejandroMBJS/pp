<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="0.5" stop-color="#0f1829"/>
      <stop offset="1" stop-color="#050812"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <circle cx="1050" cy="120" r="180" fill="#06b6d4" opacity="0.12" filter="url(#blur)"/>
  <circle cx="150" cy="520" r="200" fill="#3b82f6" opacity="0.15" filter="url(#blur)"/>

  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <g transform="translate(80, 80)">
    <rect width="96" height="96" rx="22" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
    <text x="48" y="64" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="900" fill="url(#accent)" text-anchor="middle" letter-spacing="-2">PP</text>
  </g>

  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-3">Building the future</text>
  <text x="80" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" letter-spacing="-3">
    <tspan fill="#ffffff">of </tspan><tspan fill="url(#accent)">projects.</tspan>
  </text>

  <text x="80" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#ffffff" fill-opacity="0.6" letter-spacing="-0.3">Multi-tenant CRM + QA · geolocated evidence</text>
  <text x="80" y="506" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#ffffff" fill-opacity="0.6" letter-spacing="-0.3">AI-powered audits · real-time RBAC workflows</text>

  <g transform="translate(80, 550)">
    <rect width="220" height="44" rx="22" fill="#ffffff" fill-opacity="0.06" stroke="url(#accent)" stroke-width="1.5"/>
    <circle cx="26" cy="22" r="4" fill="#06b6d4"/>
    <text x="44" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#ffffff" letter-spacing="1.5">PROJPUL.COM</text>
  </g>

  <g transform="translate(1050, 550)" opacity="0.5">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#ffffff" letter-spacing="2" text-anchor="end">PROJECTPULSE · 2026</text>
  </g>
