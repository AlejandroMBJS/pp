gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
gzip_min_length 1024;
gzip_proxied any;

# Rate-limiting zone for auth endpoints.
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

# Redact sensitive query-string tokens (?invite=, ?reset=, ?token=) from access
# logs so leaked log files don't expose one-time credentials.
map $request $scrubbed_request {
    default                                 $request;
    "~*^(?<m>\S+)\s+(?<p>[^?\s]+)\?.*(invite|reset|token|access_token|code)=" "$m $p?<redacted> HTTP/1.1";
}
log_format scrubbed '$remote_addr - $remote_user [$time_local] "$scrubbed_request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

# Plain HTTP — TLS is terminated upstream (Cloudflare → Caddy).
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 500M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP — tightened per audit-findings.md F7.
    #   img-src: dropped wildcard `https:`; we never load external images. data:
    #           and blob: stay for AuthImage's object-URL pattern.
    #   script-src: keeps 'unsafe-inline' (Next.js inline runtime) + 'unsafe-eval'
    #           (Next.js still needs eval at runtime for some hydration paths).
    #           Replacing them requires next/script nonces — out of scope here.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; script-src-elem 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; connect-src 'self' https://cloudflareinsights.com; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    access_log /var/log/nginx/access.log scrubbed;

    location ~ ^/api/v1/auth/ {
        limit_req zone=auth_zone burst=20 nodelay;
        proxy_pass http://backend:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
    }

    location /uploads/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    location /healthz {
        proxy_pass http://backend:8080/healthz;
        access_log off;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
